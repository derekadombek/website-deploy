name: Teardown Client's AWS Setup

# DANGER: permanently destroys a site env's infrastructure (S3 + CloudFront +
# any DNS/ACM). Use to spin a site down between tests so it stops billing.
#
# Guardrails: manual only, owner-only, you must retype the env name to confirm,
# and it runs in the env's GitHub Environment so it waits for the same approval
# as an apply. It destroys ONLY the site env — the access config (OIDC provider +
# deploy/Terraform roles + state backend) is a separate state and is left intact,
# so you can re-provision the site again later with a plain Terraform dispatch.
on:
  workflow_dispatch:
    inputs:
      env:
        description: Env to DESTROY.
        type: choice
        # Keep in sync with provision-client-aws.yml (no "all" — destroy one env at a time).
        options:
          - boisevalleydetailing
          - example-client
          - portfolio
      confirm:
        description: Retype the env name to confirm destruction.
        required: true

permissions:
  id-token: write # OIDC token to assume the AWS role
  contents: read

concurrency:
  group: terraform-${{ github.ref }} # shared with provision-client-aws.yml so apply/destroy never race on state
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }} # approval gate + scoped AWS_TF_ROLE_ARN/AWS_REGION
    defaults:
      run:
        working-directory: infra/envs/${{ inputs.env }}
    steps:
      - name: Guard — owner + confirmation
        working-directory: .
        run: |
          if [ "${{ github.actor }}" != "derekadombek" ]; then
            echo "::error::Only the repo owner may run this workflow (actor: ${{ github.actor }})."; exit 1
          fi
          if [ "${{ inputs.confirm }}" != "${{ inputs.env }}" ]; then
            echo "::error::Confirmation '${{ inputs.confirm }}' does not match env '${{ inputs.env }}'. Aborting."; exit 1
          fi

      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TF_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Init
        run: terraform init -input=false

      - name: Destroy
        run: terraform destroy -auto-approve -input=false
