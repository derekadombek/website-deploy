name: Terraform

# Provision/manage every site in infra/envs/*. Cheap checks run on every push
# and PR. Plan + apply assume each env's Terraform role via OIDC — and because
# that role's trust is scoped to the `provisioning` GitHub Environment, the
# token that satisfies it is only minted after this workflow's required reviewer
# approves. The broad role is therefore unusable without a human in the loop.
on:
  push:
    branches: [main]
    paths: ["infra/**", ".github/workflows/terraform.yml"]
  pull_request:
    paths: ["infra/**", ".github/workflows/terraform.yml"]
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC token to assume the AWS role
  contents: read
  pull-requests: write # post the plan as a PR comment

# Serialize Terraform against shared state. Never cancel an in-flight apply.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Credential-free checks across every env. Runs on every push and PR.
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `_template` is excluded — it carries REPLACE placeholders by design.
        env: [portfolio, example-client]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform init -backend=false -input=false
      - name: Validate
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform validate

  # Plan + apply for the envs that have a real backend + Terraform role.
  # example-client is validate-only (foreign account placeholder), so it is not
  # listed here. Both jobs declare `environment: provisioning`: that is what
  # makes the OIDC subject `…:environment:provisioning`, which is the only
  # subject each Terraform role trusts — approval is enforced by the gate AND by
  # the trust policy.
  plan:
    needs: validate
    runs-on: ubuntu-latest
    environment: provisioning
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: portfolio
            role_var: AWS_TF_ROLE_ARN_PERSONAL_PORTFOLIO
            region: us-west-2
    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[matrix.role_var] }}
          aws-region: ${{ matrix.region }}
      - name: Init
        run: terraform init -input=false
      - name: Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
          ENVNAME: ${{ matrix.env }}
        with:
          script: |
            const body = `#### Terraform Plan — \`${process.env.ENVNAME}\` 📖\n\`\`\`\n${process.env.PLAN}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.length > 65000 ? body.slice(0, 65000) + '\n…truncated' : body,
            });

  # Apply only on merge to main (or manual dispatch), after the same approval.
  apply:
    if: github.event_name != 'pull_request'
    needs: [validate, plan]
    runs-on: ubuntu-latest
    environment: provisioning
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - env: portfolio
            role_var: AWS_TF_ROLE_ARN_PERSONAL_PORTFOLIO
            region: us-west-2
    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[matrix.role_var] }}
          aws-region: ${{ matrix.region }}
      - name: Init
        run: terraform init -input=false
      - name: Apply
        run: terraform apply -auto-approve -input=false
