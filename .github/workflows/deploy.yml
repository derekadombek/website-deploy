name: Deploy site

# Publish the static site whenever its contents change on main.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Required for GitHub's OIDC token (keyless auth to AWS).
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync site to S3
        run: |
          # Long-cache the static assets, but never cache the HTML so updates
          # show up immediately (CloudFront invalidation handles the rest).
          aws s3 sync site/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 sync site/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
