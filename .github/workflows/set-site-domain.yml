name: Set site domain

# Owner-only: turn on a custom domain for an EXISTING site env. Edits
# infra/envs/<env>/main.tf in place (manage_dns = true + site_domain +
# hosted_zone_name + DNS flags) and opens a PR. Review the plan, merge, then
# re-provision via terraform.yml. Use this AFTER New TF env scaffolded the env
# (which serves the CloudFront default URL); don't re-run New TF env.
on:
  workflow_dispatch:
    inputs:
      env:
        description: Existing env dir name (e.g. boisevalleydetailing).
        required: true
      site_domain:
        description: Domain to serve the site at, e.g. boisevalleydetailing.com.
        required: true
      hosted_zone_name:
        description: Route 53 zone for the domain (blank = same as site_domain).
        required: false
        default: ""
      create_hosted_zone:
        description: Create the Route 53 zone (no zone exists for the domain yet).
        type: boolean
        default: false
      registrar_in_route53:
        description: Domain is registered in Route 53 — auto-delegate (needs create_hosted_zone).
        type: boolean
        default: false
      manage_www:
        description: Serve www over HTTPS and 301 it to the apex.
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  set-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Restrict to owner
        if: github.actor != 'derekadombek'
        run: |
          echo "Only the repo owner may run this workflow (actor: ${{ github.actor }})." >&2
          exit 1

      - uses: actions/checkout@v4

      - name: Set domain
        run: |
          infra/scripts/set-site-domain.sh "${{ inputs.env }}" \
            --domain "${{ inputs.site_domain }}" \
            ${{ inputs.hosted_zone_name != '' && format('--zone "{0}"', inputs.hosted_zone_name) || '' }} \
            --create-zone "${{ inputs.create_hosted_zone }}" \
            --registrar-in-route53 "${{ inputs.registrar_in_route53 }}" \
            --www "${{ inputs.manage_www }}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="set-domain-${{ inputs.env }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add "infra/envs/${{ inputs.env }}"
          git commit -m "Set ${{ inputs.env }} domain to ${{ inputs.site_domain }}"
          git push -u origin "${branch}"
          gh pr create --fill \
            --title "Set ${{ inputs.env }} domain (${{ inputs.site_domain }})" \
            --body "Generated by the set-site-domain workflow. Review the plan, merge,
          then re-provision via terraform.yml. Additive in-place change (CloudFront
          gets the alias + ACM cert; content untouched).

          > If the domain's Route 53 zone is new + registered elsewhere, the ACM
          > validation will block until you delegate the nameservers (see
          > onboard-site.sh). A PR opened by GITHUB_TOKEN doesn't auto-run the plan
          > workflow; push an empty commit or re-open to trigger it."
