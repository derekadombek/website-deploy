name: New TF env

# Owner-only: generate a new site's env dir (infra/envs/<name>) from inputs and
# open a PR. Review + merge the PR (terraform plan runs on it), then bootstrap
# the account and run the aws-provision-site action.
#
# workflow_dispatch already requires write access to trigger, and the guard step
# below pins it to the owner as defence in depth.
on:
  workflow_dispatch:
    inputs:
      name:
        description: Env dir name (also the default project name), e.g. acme.
        required: true
      site_domain:
        description: Domain the site is served at, e.g. acme.com. Leave blank when manage_dns is false (serves the CloudFront default URL).
        required: false
        default: ""
      manage_dns:
        description: Provision an ACM cert + Route 53 records for site_domain. False = serve the CloudFront default URL (no domain needed).
        type: boolean
        default: true
      hosted_zone_name:
        description: Route 53 zone for the domain (blank = same as site_domain).
        required: false
        default: ""
      aws_region:
        description: AWS region.
        required: false
        default: us-west-2
      create_hosted_zone:
        description: Create the Route 53 zone (client has no Route 53 yet).
        type: boolean
        default: false
      registrar_in_route53:
        description: Domain is registered in Route 53 — auto-delegate (needs create_hosted_zone).
        type: boolean
        default: false
      manage_www:
        description: Serve www over HTTPS and 301 it to the apex.
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Restrict to owner
        if: github.actor != 'derekadombek'
        run: |
          echo "Only the repo owner may run this workflow (actor: ${{ github.actor }})." >&2
          exit 1

      - uses: actions/checkout@v4

      - name: Generate env dir
        run: |
          infra/scripts/new-site.sh \
            --name "${{ inputs.name }}" \
            --domain "${{ inputs.site_domain }}" \
            ${{ inputs.hosted_zone_name != '' && format('--zone "{0}"', inputs.hosted_zone_name) || '' }} \
            --region "${{ inputs.aws_region }}" \
            --manage-dns "${{ inputs.manage_dns }}" \
            --create-zone "${{ inputs.create_hosted_zone }}" \
            --registrar-in-route53 "${{ inputs.registrar_in_route53 }}" \
            --www "${{ inputs.manage_www }}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="add-site-${{ inputs.name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add "infra/envs/${{ inputs.name }}"
          git commit -m "Add ${{ inputs.name }} site env"
          git push -u origin "${branch}"
          gh pr create \
            --title "Add ${{ inputs.name }} site env" \
            --body "Generated by the New TF env workflow. Review the env config + plan, then merge and onboard:
          1. **Register CI** — run the *Register CI environment* workflow with env \`${{ inputs.name }}\` + the terraform role ARN/region that aws-grant-access printed.
          2. **Provision** — run \`terraform.yml\` for env \`${{ inputs.name }}\` (approve the environment) to create S3 + CloudFront.
          3. **Wire the deploy repo** — set \`AWS_REGION\` / \`AWS_DEPLOY_ROLE_ARN\` / \`S3_BUCKET\` / \`CLOUDFRONT_DISTRIBUTION_ID\` + add \`deploy.yml\`.

          (The state backend already exists — aws-grant-access created it.)

          > Heads-up: a PR opened by GITHUB_TOKEN doesn't auto-run the terraform plan workflow; push an empty commit or re-open to trigger it."
