name: AWS static site deploy
description: >-
  Optionally build a static site, then sync it to S3 and invalidate CloudFront,
  authenticating to AWS keylessly via GitHub OIDC. Account-agnostic: the role,
  bucket, and distribution are passed in, so the same action deploys any site in
  any account.

# Caller requirements:
#   permissions:
#     id-token: write   # mint the OIDC token configure-aws-credentials exchanges
#     contents: read
# The role passed as `role-arn` must trust the calling repo's OIDC subject and
# grant s3:PutObject/DeleteObject/ListBucket on the bucket plus
# cloudfront:CreateInvalidation on the distribution (the deploy role this repo's
# Terraform provisions).

inputs:
  aws-region:
    description: AWS region of the S3 bucket.
    required: true
  role-arn:
    description: ARN of the deploy role to assume via OIDC.
    required: true
  s3-bucket:
    description: Name of the destination S3 bucket.
    required: true
  cloudfront-distribution-id:
    description: CloudFront distribution ID to invalidate after sync.
    required: true
  source-dir:
    description: Directory whose contents are synced to the bucket (e.g. site, dist).
    required: true
  build-command:
    description: Optional build command (e.g. "npm run build"). Skipped if empty.
    required: false
    default: ""
  install-command:
    description: Optional dependency install command (e.g. "npm ci"). Skipped if empty.
    required: false
    default: ""
  node-version:
    description: Node version used when a build/install command is set.
    required: false
    default: "20"
  working-directory:
    description: Directory to run install/build from (source-dir is resolved from here).
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Set up Node
      # Only needed when the caller asks us to build or install.
      if: inputs.build-command != '' || inputs.install-command != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      if: inputs.install-command != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.install-command }}

    - name: Build
      if: inputs.build-command != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.build-command }}

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Sync to S3
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Long-cache the fingerprinted assets, but never cache the HTML so
        # updates show up immediately (CloudFront invalidation handles the rest).
        aws s3 sync "${{ inputs.source-dir }}" "s3://${{ inputs.s3-bucket }}" \
          --delete \
          --exclude "*.html" \
          --cache-control "public,max-age=31536000,immutable"

        aws s3 sync "${{ inputs.source-dir }}" "s3://${{ inputs.s3-bucket }}" \
          --delete \
          --exclude "*" --include "*.html" \
          --cache-control "no-cache"

    - name: Invalidate CloudFront cache
      shell: bash
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ inputs.cloudfront-distribution-id }}" \
          --paths "/*"
