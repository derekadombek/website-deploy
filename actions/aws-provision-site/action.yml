name: AWS provision site (Terraform)
description: >-
  Provision (or update) one site's full stack by running Terraform against its
  env dir in this repo, babysitting Route 53 delegation so the run never hangs at
  ACM validation. Wraps infra/scripts/onboard-site.sh.

# Where this runs: against infra/envs/<env> inside derekadombek/website-deploy,
# so the env must already exist in the repo. Used for the one-time bootstrap
# apply (privileged creds) and for ongoing management (the env's Terraform role
# via OIDC). The state backend must already exist — run aws-bootstrap-backend
# first for a brand-new account.
inputs:
  env:
    description: Env dir name under infra/envs/ (e.g. portfolio, example-client).
    required: true
  aws-region:
    description: Region for the env's provider/backend.
    required: true
  role-arn:
    description: >-
      Optional Terraform role to assume via OIDC (the env's terraform_role_arn,
      for ongoing management — pair with an approval-gated environment). Leave
      empty to use privileged credentials configured in a prior step (first-time
      bootstrap).
    required: false
    default: ""
  terraform-version:
    description: Terraform version to install.
    required: false
    default: "1.5.7"
  confirm-fresh:
    description: >-
      Set true ONLY for the first-ever provision of this env. It's a guard: the
      action refuses to apply against empty Terraform state otherwise, since on a
      re-run empty state means lost/mis-pointed state and applying would create
      duplicate resources (notably a duplicate Route 53 zone).
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Ensure dig is available
      shell: bash
      run: |
        if ! command -v dig >/dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y -qq dnsutils
        fi

    - name: Configure AWS credentials (OIDC)
      if: inputs.role-arn != ''
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Provision
      shell: bash
      env:
        CONFIRM_FRESH: ${{ inputs.confirm-fresh }}
      run: |
        "${{ github.action_path }}/../../infra/scripts/onboard-site.sh" "${{ inputs.env }}"
